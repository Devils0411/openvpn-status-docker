services:
  openvpn-status:
    ports:
      - "2000:2000" # Хост:контейнер #При условии отсутствия network_mode
    extends:
      file: docker-compose.yml
      service: openvpn-status
    environment:
      - PORT=2000
      - ADMIN_USERNAME=admin!
      - ADMIN_PASSWORD=admin!
      - BOT_ON=N
      - BOT_TOKEN=1
      - ADMIN_ID=1
      - HTTPS_ON=N #Включение HTTPS
#      - DOMAIN_NAME=Test.ru #Указываем имя домена, если оно существует. (при условии включения HTTPS)