services:
  openvpn-status:
    hostname: openvpn-status.antizapret
    networks:
      - antizapret_default
    extends:
      file: docker-compose.yml
      service: openvpn-status
    environment:
      - PORT=2000
      - ADMIN_USERNAME=admin!
      - ADMIN_PASSWORD=admin!
      - BOT_ON=N
      - BOT_TOKEN=1
      - ADMIN_ID=1
      - HTTPS_ON=N #При интеграции в Antizapret - https должен быть отключен
#      - DOMAIN_NAME=Test.ru #Указываем имя домена, если оно существует. (при условии включения HTTPS)

# Необходимо пересоздать контейнер dashboard с нижеуказанными настройками
