#      service: dashboard
#    environment:
#      - DASHBOARD_SERVICE_6=OpenVPN Status:6443:openvpn-status.antizapret:2000
#
# Если запущен контейнер https в Antizapret, его также нужно пересоздать с нижеуказанными настройками
